version: "3.8"

services:
  federated-ensemble:
    build:
      context: ../..
      dockerfile: experiments/ensemble/Dockerfile
    environment:
      - WANDB_DISABLED=true
      - SCRIPT=${SCRIPT:-federated_ensemble.py}
      - DATASET=${DATASET:-cifar10}
      - MODEL=${MODEL:-lenet}
      - NUM_CLIENTS=${NUM_CLIENTS:-3}
      - ALPHA=${ALPHA:-0.5}
      - EPOCHS=${EPOCHS:-10}
      - BATCH_SIZE=${BATCH_SIZE:-128}
      - LR=${LR:-0.001}
      - DEVICE=${DEVICE:-cpu}
      - MODEL_DIR=/app/experiments/ensemble/docker-output/models
      - EXTRA_ARGS=${EXTRA_ARGS:-}
    volumes:
      - ./docker-output:/app/experiments/ensemble/docker-output
    command: >
      bash -lc "python experiments/ensemble/$${SCRIPT}
      --dataset $${DATASET}
      --model $${MODEL}
      --num-clients $${NUM_CLIENTS}
      --alpha $${ALPHA}
      --epochs $${EPOCHS}
      --batch-size $${BATCH_SIZE}
      --lr $${LR}
      --device $${DEVICE}
      --model-dir $${MODEL_DIR}
      $${EXTRA_ARGS}"
