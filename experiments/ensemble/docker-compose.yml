version: "3.8"

services:
  federated-ensemble:
    build:
      context: ../..
      dockerfile: experiments/ensemble/Dockerfile
    environment:
      - WANDB_DISABLED=true
      - SCRIPT=${SCRIPT:-federated_ensemble.py}
      - DATASET=${DATASET:-cifar10}
      - MODEL=${MODEL:-lenet}
      - NUM_CLIENTS=${NUM_CLIENTS:-3}
      - ALPHA=${ALPHA:-0.5}
      - EPOCHS=${EPOCHS:-10}
      - BATCH_SIZE=${BATCH_SIZE:-128}
      - LR=${LR:-0.001}
      - DEVICE=${DEVICE:-cpu}
      - MODEL_DIR=/app/experiments/ensemble/docker-output/models
      - EXTRA_ARGS=${EXTRA_ARGS:-}
    volumes:
      - ./docker-output:/app/experiments/ensemble/docker-output
    command: >
      bash -lc "python experiments/ensemble/$${SCRIPT}
      --dataset $${DATASET}
      --model $${MODEL}
      --num-clients $${NUM_CLIENTS}
      --alpha $${ALPHA}
      --epochs $${EPOCHS}
      --batch-size $${BATCH_SIZE}
      --lr $${LR}
      --device $${DEVICE}
      --model-dir $${MODEL_DIR}
      $${EXTRA_ARGS}"

  crypten-ensemble-dummy:
    build:
      context: ../..
      dockerfile: experiments/ensemble/Dockerfile
    environment:
      - WORLD_SIZE=${WORLD_SIZE:-3}
      - NUM_SAMPLES=${NUM_SAMPLES:-1}
      - NUM_CLASSES=${NUM_CLASSES:-5}
      - IMG_SIZE=${IMG_SIZE:-1}
      - IN_CH=${IN_CH:-1}
      - TTA_STEPS=${TTA_STEPS:-2}
      - SPECTRAL_ITERS=${SPECTRAL_ITERS:-5}
    command: >
      bash -lc "python experiments/ensemble/crypten_smpc_ensemble_dummy.py
      --num-samples $${NUM_SAMPLES}
      --num-classes $${NUM_CLASSES}
      --img-size $${IMG_SIZE}
      --in-ch $${IN_CH}
      --tta-steps $${TTA_STEPS}
      --spectral-iters $${SPECTRAL_ITERS}"
